<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyRoulette</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <h1>🎲 MyRoulette</h1>
    <p class="subtitle">Tire un code aléatoire et découvre ton action !</p>

    <section class="panel">
      <label for="deckSelect">Choisir un deck</label>
      <select id="deckSelect"><option>Chargement...</option></select>

      <button id="spinBtn">🎰 Lancer</button>

      <div id="result" class="result hidden">
        <div id="resultCode" class="code"></div>
        <div id="resultText" class="text"></div>
      </div>
    </section>

    <!-- Historique -->
    <section class="panel" style="margin-top:16px">
      <h2>📋 Historique</h2>
      <ul id="historyList"></ul>
      <button onclick="clearHistory()" class="btn-secondary">🗑️ Effacer</button>
    </section>

    <!-- Admin : ajouter une règle -->
    <section class="panel admin" style="margin-top:16px">
      <h2>➕ Ajouter une règle</h2>
      <input id="newDeck" type="text" placeholder="Nom du deck (ex: Deck 1)" />
      <input id="newCode" type="text" placeholder="Code (ex: A1)" />
      <input id="newText" type="text" placeholder="Description de l'action" />
      <button onclick="addRule()">Ajouter</button>
      <p id="adminMsg"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
