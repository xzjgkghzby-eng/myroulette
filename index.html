<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyRoulette • Comme FapRoulette</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>My<span>Roulette</span></h1>
        <nav>
            <button onclick="showSection('home')">Accueil</button>
            <button onclick="showSection('history')">Historique</button>
        </nav>
    </header>

    <!-- ACCUEIL -->
    <section id="home" class="section active">
        <h2>Choisis ton template</h2>
        <div id="templates-grid" class="grid"></div>
    </section>

    <!-- JEU -->
    <section id="game" class="section">
        <button class="back-btn" onclick="backToHome()">← Retour</button>
        
        <div class="game-visual">
            <img id="template-image" alt="Template">
            <div id="rolled-display" class="rolled-display"></div>
        </div>

        <div class="roll-area">
            <button id="roll-btn" class="roll-button" onclick="roll()">LANCER LA ROULETTE</button>
            <button id="reroll-btn" class="reroll-button hidden" onclick="reroll()">Relancer (<span id="reroll-count">0</span>)</button>
        </div>

        <div id="instructions-list" class="instructions-list"></div>
    </section>

    <!-- HISTORIQUE -->
    <section id="history" class="section">
        <h2>Historique des tirages</h2>
        <div id="history-list" class="history-list"></div>
    </section>

    <!-- MODAL HISTORIQUE -->
    <div id="history-modal" class="modal hidden">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">×</button>
            <h3 id="modal-template"></h3>
            <p id="modal-date"></p>
            <div id="modal-results" class="rolled-display"></div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="script.js"></script>
</body>
</html>        <div id="results-container" class="results">
            <table id="results-table">
                <thead>
                    <tr>
                        <th>Lettre</th>
                        <th>Catégorie</th>
                        <th>Chiffre</th>
                        <th>Instruction</th>
                    </tr>
                </thead>
                <tbody id="results-body"></tbody>
            </table>
        </div>
    </section>

    <!-- HISTORIQUE -->
    <section id="history" class="section">
        <h2>Historique des tirages</h2>
        <div id="history-list" class="history-list"></div>
    </section>

    <!-- MODAL DÉTAIL HISTORIQUE -->
    <div id="history-modal" class="modal hidden">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">×</button>
            <h3 id="modal-template"></h3>
            <p id="modal-date"></p>
            <table id="modal-table">
                <thead>
                    <tr><th>Lettre</th><th>Catégorie</th><th>Chiffre</th><th>Instruction</th></tr>
                </thead>
                <tbody id="modal-body"></tbody>
            </table>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="toast hidden"></div>

    <script src="script.js"></script>
</body>
</html>
